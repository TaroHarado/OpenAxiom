<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trench</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 280px;
        background: #0a0a0e;
        color: #c0c0ce;
        font: 11px/1.4 "Geist Mono", "JetBrains Mono", ui-monospace, "Cascadia Code", Menlo, monospace;
        letter-spacing: -0.01em;
      }

      .wrap { padding: 12px; display: grid; gap: 10px; }

      /* ── header ── */
      .head {
        display: flex;
        align-items: center;
        gap: 8px;
        padding-bottom: 10px;
        border-bottom: 1px solid #1a1a22;
      }
      .logo {
        width: 22px; height: 22px;
        display: grid; place-items: center;
        border-radius: 4px;
        background: #14f195;
        color: #020408;
        font-size: 8px; font-weight: 900;
        letter-spacing: 0.04em;
        flex-shrink: 0;
      }
      .head-text { display: grid; gap: 1px; }
      .head-title {
        font-size: 11px; font-weight: 700;
        color: #f4f4f7;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .head-sub { font-size: 9px; color: #3e3e4e; letter-spacing: 0.02em; }

      /* ── status row ── */
      .status {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 8px;
        border: 1px solid #1a1a22;
        border-radius: 4px;
        background: #0d0d11;
        font-size: 10px;
        color: #555565;
      }
      .dot {
        width: 5px; height: 5px;
        border-radius: 50%;
        background: #14f195;
        flex-shrink: 0;
      }

      /* ── action buttons ── */
      .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

      button, a.btn {
        height: 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #1e1e26;
        border-radius: 4px;
        background: #111117;
        color: #808090;
        text-decoration: none;
        font: 700 9px/1 "Geist Mono", "JetBrains Mono", ui-monospace, monospace;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        transition: border-color 80ms, color 80ms;
      }
      button:hover, a.btn:hover { border-color: #2a2a35; color: #c0c0ce; }

      .primary {
        border-color: #18281e;
        background: #0d1a12;
        color: #14f195;
      }
      .primary:hover { border-color: rgba(20,241,149,0.45); color: #5fffc0; }

      .wide { width: 100%; }

      /* ── wallet box ── */
      .wallet-box {
        display: grid;
        gap: 6px;
        border: 1px solid #1a1a22;
        border-radius: 4px;
        background: #0a0a0e;
        padding: 8px;
      }
      .wallet-box label {
        display: grid;
        gap: 3px;
        color: #3e3e4e;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .wallet-box textarea,
      .wallet-box input {
        width: 100%;
        border: 1px solid #1e1e26;
        border-radius: 4px;
        background: #0d0d11;
        color: #c0c0ce;
        padding: 6px 7px;
        font: 10px/1.35 "Geist Mono", "JetBrains Mono", ui-monospace, monospace;
        outline: none;
        letter-spacing: 0;
        resize: vertical;
      }
      .wallet-box textarea { min-height: 60px; }
      .wallet-box textarea:focus,
      .wallet-box input:focus { border-color: #14f195; }

      /* ── hint / result ── */
      .hint {
        font-size: 9px;
        color: #3e3e4e;
        line-height: 1.5;
        letter-spacing: 0.02em;
      }
      #result {
        font-size: 10px;
        color: #14f195;
        min-height: 14px;
        word-break: break-all;
      }
      #result:empty { display: none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <div class="logo">TR</div>
        <div class="head-text">
          <div class="head-title">Trench</div>
          <div class="head-sub">axiom overlay</div>
        </div>
      </div>

      <div class="status">
        <span class="dot"></span>
        <span>Extension active</span>
      </div>

      <div class="actions">
        <a class="btn primary" href="https://axiom.trade/pulse" target="_blank">Axiom</a>
        <button id="options" type="button">Options</button>
      </div>

      <div class="wallet-box">
        <label>Hot wallet key
          <textarea id="secret" placeholder="base58 · hex · bytes · JSON array"></textarea>
        </label>
        <label>Password
          <input id="password" type="password" placeholder="local encryption password" />
        </label>
        <button class="primary wide" id="import" type="button">Import hot wallet</button>
      </div>

      <button class="wide" id="force" type="button">Force panel on this tab</button>

      <div id="result"></div>
      <div class="hint">Missing panel → DevTools Console → [Trench] content script mounted</div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
